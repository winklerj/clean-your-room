{% extends "base.html" %}
{% block title %}New Pipeline - Build Your Room{% endblock %}
{% block content %}
<h1>Create Pipeline</h1>

{% if error %}
<div class="builder-error">{{ error }}</div>
{% endif %}

<form method="post" action="/pipelines" class="new-pipeline-form">
    <label>
        <span class="field-label">Repository</span>
        {% if repos %}
        <select name="repo_id" required>
            <option value="">Select a repo...</option>
            {% for repo in repos %}
            <option value="{{ repo['id'] }}"
                {% if selected_repo_id and selected_repo_id == repo['id'] %}selected{% endif %}>
                {{ repo.name }} ({{ repo.local_path }})
            </option>
            {% endfor %}
        </select>
        {% else %}
        <p class="empty-state">No repos available. <a href="/repos/new">Add one first.</a></p>
        {% endif %}
    </label>

    <label>
        <span class="field-label">Pipeline Definition</span>
        <span class="field-hint">Choose what work this pipeline will do</span>
        {% if pipeline_defs %}
        <select name="pipeline_def_id" id="def-selector" required
                hx-get="" hx-target="#def-preview" hx-swap="innerHTML"
                hx-trigger="change">
            <option value="">Select a definition...</option>
            {% for d in pipeline_defs %}
            <option value="{{ d['id'] }}">{{ d.name }}</option>
            {% endfor %}
        </select>
        {% else %}
        <p class="empty-state">No pipeline definitions. <a href="/pipeline-defs/new">Create one first.</a></p>
        {% endif %}
    </label>

    <div id="def-preview" class="def-preview-container"></div>

    <div class="builder-actions">
        <button type="submit" class="btn-create"
                {% if not repos or not pipeline_defs %}disabled{% endif %}>
            Create Pipeline
        </button>
        <a href="/" class="btn-cancel">Cancel</a>
    </div>
</form>

{% if pipeline_defs %}
<script>
(function() {
    var sel = document.getElementById('def-selector');
    sel.addEventListener('change', function() {
        var id = sel.value;
        if (id) {
            sel.setAttribute('hx-get', '/pipeline-defs/' + id + '/preview');
        } else {
            var preview = document.getElementById('def-preview');
            while (preview.firstChild) preview.removeChild(preview.firstChild);
            sel.setAttribute('hx-get', '');
        }
        if (window.htmx) { htmx.process(sel); }
    });
})();
</script>
{% endif %}
{% endblock %}
