<tr id="prompt-{{ prompt['id'] }}">
    <td colspan="6">
        <form class="prompt-edit-form" hx-put="/prompts/{{ prompt['id'] }}" hx-target="#prompt-{{ prompt['id'] }}" hx-swap="outerHTML">
            <div class="builder-row">
                <div class="builder-field builder-field-sm">
                    <label>Name</label>
                    <input type="text" name="name" value="{{ prompt['name'] }}" required>
                </div>
                <div class="builder-field builder-field-sm">
                    <label>Stage Type</label>
                    <select name="stage_type">
                        {% for st in stage_types %}
                        <option value="{{ st }}" {% if prompt['stage_type'] == st %}selected{% endif %}>{{ st | replace('_', ' ') | title }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="builder-field builder-field-sm">
                    <label>Agent Type</label>
                    <select name="agent_type">
                        {% for at in agent_types %}
                        <option value="{{ at }}" {% if prompt['agent_type'] == at %}selected{% endif %}>{{ at | capitalize }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            <div class="builder-field">
                <label>Body</label>
                <textarea name="body" rows="10" required>{{ prompt['body'] }}</textarea>
            </div>
            <div class="builder-actions">
                <button type="submit" class="btn-create">Save</button>
                <a hx-get="/prompts/{{ prompt['id'] }}/row" hx-target="#prompt-{{ prompt['id'] }}" hx-swap="outerHTML" class="btn-cancel">Cancel</a>
            </div>
        </form>
    </td>
</tr>
