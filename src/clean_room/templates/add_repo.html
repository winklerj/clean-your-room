{% extends "base.html" %}
{% block title %}Add Repo - Clean Room{% endblock %}
{% block content %}
<h1>Add Repo</h1>
<form method="post" action="/repos">
    <label>GitHub URL
        <input type="url" name="github_url" placeholder="https://github.com/org/repo" required>
    </label>
    <button type="submit">Clone & Add</button>
</form>
{% endblock %}
